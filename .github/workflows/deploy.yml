name: Angular CI/CD Deploy

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install

      - name: Build Angular app
        run: npm run build

      - name: Archive production build
        # Angular builds into dist/<project-name>, we grab that folder dynamically
        run: |
          DIST_DIR=$(ls dist)
          echo "Archiving dist/$DIST_DIR"
          tar -czf angular-dist.tar.gz -C dist/$DIST_DIR .

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: angular-dist
          path: angular-dist.tar.gz

  deploy:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: angular-dist
          path: ./dist

      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT }}
          source: "./dist/angular-dist.tar.gz"
          target: "${{ secrets.APP_PATH }}/angular-dist.tar.gz"
          script: |
            set -e
            APP_PATH=${{ secrets.APP_PATH }}
            mkdir -p $APP_PATH
            rm -rf $APP_PATH/*
            tar -xzf $APP_PATH/angular-dist.tar.gz -C $APP_PATH
            sudo systemctl reload nginx

  notify:
    needs: [build, deploy]
    if: always()
    runs-on: ubuntu-latest

    steps:
      - name: Notify CI/CD result
        run: |
          BUILD_STATUS="${{ needs.build.result }}"
          DEPLOY_STATUS="${{ needs.deploy.result }}"

          if [ "$BUILD_STATUS" = "success" ] && [ "$DEPLOY_STATUS" = "success" ]; then
            ICON="🚀✅"
            STATUS="Build & Deploy succeeded"
          else
            ICON="❌"
            STATUS="Pipeline failed"
          fi

          MESSAGE="$ICON CI/CD Finished
          Repo: ${{ github.repository }}
          Branch: ${{ github.ref_name }}
          Build: $BUILD_STATUS
          Deploy: $DEPLOY_STATUS"

          curl -s -X POST https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage \
            -d chat_id=${{ secrets.TELEGRAM_CHAT_ID }} \
            -d message_thread_id=${{ secrets.TELEGRAM_TOPIC_ID }} \
            -d text="$MESSAGE"