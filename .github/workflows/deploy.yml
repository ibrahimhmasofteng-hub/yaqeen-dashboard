name: Angular CI/CD Deploy on VPS

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Deploy & build on VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT }}
          script: |
            set -e

            # Path on VPS where your app lives
            APP_PATH=${{ secrets.APP_PATH }}

            # Ensure folder exists
            mkdir -p $APP_PATH

            # Navigate to the app folder
            cd $APP_PATH

            # Remove old code (optional, if you want a clean build)
            rm -rf ./*

            # Clone the latest code from GitHub
            git clone -b main https://github.com/${{ github.repository }} .

            # Install Node.js (if not installed, assume Node 22 for Angular)
            if ! command -v node >/dev/null 2>&1; then
              curl -fsSL https://deb.nodesource.com/setup_22.x | sudo -E bash -
              sudo apt-get install -y nodejs
            fi

            # Install dependencies
            npm install

            # Build Angular app
            npm run build

            # The Angular dist folder (dynamic)
            DIST_DIR=$(ls dist)
            echo "Deploying $DIST_DIR to $APP_PATH"

            # Remove old deployment and copy new build
            rm -rf $APP_PATH/*
            cp -r dist/$DIST_DIR/* $APP_PATH/

            # Reload Nginx
            sudo systemctl reload nginx

  notify:
    needs: deploy
    if: always()
    runs-on: ubuntu-latest

    steps:
      - name: Notify CI/CD result
        run: |
          DEPLOY_STATUS="${{ needs.deploy.result }}"

          if [ "$DEPLOY_STATUS" = "success" ]; then
            ICON="🚀✅"
            STATUS="Build & Deploy succeeded"
          else
            ICON="❌"
            STATUS="Pipeline failed"
          fi

          MESSAGE="$ICON CI/CD Finished
          Repo: ${{ github.repository }}
          Branch: ${{ github.ref_name }}
          Deploy: $DEPLOY_STATUS"

          curl -s -X POST https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage \
            -d chat_id=${{ secrets.TELEGRAM_CHAT_ID }} \
            -d message_thread_id=${{ secrets.TELEGRAM_TOPIC_ID }} \
            -d text="$MESSAGE"