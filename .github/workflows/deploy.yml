name: Angular CI/CD Deploy on VPS

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Deploy & build on VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
            host: ${{ secrets.SSH_HOST }}
            username: ${{ secrets.SSH_USER }}
            key: ${{ secrets.SSH_PRIVATE_KEY }}
            port: ${{ secrets.SSH_PORT }}
            source: "./dist/angular-dist.tar.gz"
            target: "/tmp/angular-dist.tar.gz"
            script: |
              set -e
              APP_PATH=${{ secrets.APP_PATH }}
              mkdir -p $APP_PATH
              rm -rf $APP_PATH/*
              tar -xzf /tmp/angular-dist.tar.gz -C $APP_PATH
              sudo systemctl reload nginx

  notify:
    needs: deploy
    if: always()
    runs-on: ubuntu-latest

    steps:
      - name: Notify CI/CD result
        run: |
          DEPLOY_STATUS="${{ needs.deploy.result }}"

          if [ "$DEPLOY_STATUS" = "success" ]; then
            ICON="🚀✅"
            STATUS="Build & Deploy succeeded"
          else
            ICON="❌"
            STATUS="Pipeline failed"
          fi

          MESSAGE="$ICON CI/CD Finished
          Repo: ${{ github.repository }}
          Branch: ${{ github.ref_name }}
          Deploy: $DEPLOY_STATUS"

          curl -s -X POST https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage \
            -d chat_id=${{ secrets.TELEGRAM_CHAT_ID }} \
            -d message_thread_id=${{ secrets.TELEGRAM_TOPIC_ID }} \
            -d text="$MESSAGE"
